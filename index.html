<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIGS DESIGN</title>
  <style>
    :root{--ink:#0a0a0a;--paper:#f4f4f0}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font-family:Arial,"Helvetica Neue",sans-serif}body.modal-open{overflow:hidden}a{color:inherit;text-decoration:none}button{font:inherit}main{min-height:100svh;padding:0 32px}.top{height:88px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid}.brand{font-size:15px;font-weight:900;letter-spacing:-.02em}.meta,.label{font-size:10px;font-weight:700;letter-spacing:.16em}.hero{min-height:calc(100svh - 88px);padding:8vh 0 6vh;display:flex;flex-direction:column}.copy h1{margin:18px 0 0;font-size:clamp(92px,18vw,270px);line-height:.76;letter-spacing:-.09em;font-weight:900}.slogan{align-self:flex-end;margin:auto 0 0;font-size:clamp(18px,2vw,29px);line-height:1.35;font-weight:700;letter-spacing:-.04em;text-align:right}.contact{border-top:1px solid;padding:80px 0 96px;display:grid;grid-template-columns:1fr 1.35fr;gap:5vw;align-items:end}.contact h2{margin:15px 0 0;font-size:clamp(40px,6vw,86px);line-height:1;letter-spacing:-.065em}.wechat{width:100%;appearance:none;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;padding:24px;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:.25s}.wechat:hover,.wechat:focus-visible{background:transparent;color:var(--ink);padding-left:30px;padding-right:18px;outline:none}.arrow{font-size:32px;line-height:1;transition:transform .25s}.wechat:hover .arrow{transform:translate(4px,-4px)}.modal{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:22px;background:rgba(0,0,0,.88);opacity:0;visibility:hidden;transition:.25s}.modal.open{opacity:1;visibility:visible}.modal-card{position:relative;width:min(90vw,430px);background:#fff;padding:40px;transform:translateY(18px);transition:.25s}.modal.open .modal-card{transform:none}.modal img{display:block;width:100%;height:auto;background:#fff}.close{position:absolute;top:-38px;right:0;border:0;background:transparent;color:var(--paper);cursor:pointer;font-size:25px;line-height:1}footer{height:76px;border-top:1px solid;display:flex;align-items:center;justify-content:space-between;font-size:9px;font-weight:700;letter-spacing:.14em}@media(max-width:720px){main{padding:0 18px}.top{height:70px}.meta{display:none}.hero{min-height:calc(100svh - 70px);padding:12vh 0 28px}.copy h1{margin-top:14px;font-size:clamp(76px,29vw,132px);line-height:.8}.slogan{font-size:18px}.contact{padding:58px 0 64px;display:block}.contact h2{font-size:50px}.wechat{margin-top:60px}.modal-card{padding:18px}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body><main>
  <header class="top"><a class="brand" href="#top" aria-label="SIGS Design 首页">SIGS</a><span class="meta">INDEPENDENT DESIGN · 2026</span></header>
  <section class="hero" id="top"><div class="copy"><p class="label">SIGS / DESIGN PRACTICE</p><h1>SIGS<br>DESIGN.</h1></div><p class="slogan">清晰的想法，<br>克制的表达。</p></section>
  <section class="contact"><div><p class="label">START A CONVERSATION</p><h2>有问题可以联系。</h2></div><button class="wechat" id="wechat" type="button" aria-label="打开微信二维码"><span class="label">OPEN WECHAT</span><span class="arrow">↗</span></button></section>
  <footer><span>© 2026 SIGS DESIGN</span><a href="https://si.gs">SI.GS</a></footer>
</main>
<div class="modal" id="qr-modal" role="dialog" aria-modal="true" aria-label="微信二维码" aria-hidden="true"><div class="modal-card"><button class="close" type="button" aria-label="关闭二维码">×</button><img src="https://img.viox.com/sigs.webp" alt="SIGS DESIGN 微信二维码"></div></div>
<script>const b=document.querySelector('#wechat'),m=document.querySelector('#qr-modal'),x=m.querySelector('.close');let last;function openQR(){last=document.activeElement;m.classList.add('open');m.setAttribute('aria-hidden','false');document.body.classList.add('modal-open');x.focus()}function closeQR(){m.classList.remove('open');m.setAttribute('aria-hidden','true');document.body.classList.remove('modal-open');last&&last.focus()}b.onclick=openQR;x.onclick=closeQR;m.onclick=e=>{if(e.target===m)closeQR()};addEventListener('keydown',e=>{if(e.key==='Escape'&&m.classList.contains('open'))closeQR()})</script></body>
</html>
